syntax = "proto3";

package conf_sync;

// ConfigSync service for listing and watching resources
service ConfigSync {
    // Get server information including endpoint mode and supported resource kinds
    rpc GetServerInfo(ServerInfoRequest) returns (ServerInfoResponse);
    
    // List all resources of a specific kind
    rpc List(ListRequest) returns (ListResponse);
    
    // Watch for changes to resources of a specific kind
    rpc Watch(WatchRequest) returns (stream WatchResponse);
}

// List request
message ListRequest {
    string key = 1;
    string kind = 2;  // Resource kind as string, e.g. "Gateway", "HTTPRoute"
    string expected_server_id = 3;  // Expected server ID for server instance validation
}

// List response
message ListResponse {
    string data = 1;
    uint64 sync_version = 2;
    string server_id = 3;  // Server instance ID for detecting server restarts
}

// Watch request
message WatchRequest {
    string key = 1;
    string kind = 2;  // Resource kind as string, e.g. "Gateway", "HTTPRoute"
    string client_id = 3;
    string client_name = 4;
    uint64 from_version = 5;
    string expected_server_id = 6;  // Expected server ID for server instance validation
}

// Watch response
message WatchResponse {
    string data = 1;
    uint64 sync_version = 2;
    string err = 3;
    string server_id = 4;  // Server instance ID for detecting server restarts
}

// Server info request
message ServerInfoRequest {}

// Server info response
message ServerInfoResponse {
    string server_id = 1;              // Server instance ID
    string endpoint_mode = 2;          // "EndpointSlice", "Endpoint", or "Auto"
    repeated string supported_kinds = 3;  // List of resource kinds supported by this server
}

