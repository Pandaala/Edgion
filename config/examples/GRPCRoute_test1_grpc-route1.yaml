apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpc-route1
  namespace: test1
spec:
  parentRefs:
    - name: gateway1
      namespace: default
      sectionName: http18080
    - name: gateway1
      namespace: default
      sectionName: https18443

  hostnames:
    - "grpc.example.com"
    - "api.example.com"

  rules:
    # Rule 1: Exact match for a specific gRPC service and method
    - matches:
        - method:
            type: Exact
            service: test.TestService
            method: SayHello
      backendRefs:
        - name: grpc-service
          port: 30021
          weight: 1

    # Rule 2: Match all methods of a specific service
    - matches:
        - method:
            type: Exact
            service: test.TestService
      backendRefs:
        - name: grpc-service
          port: 30021
          weight: 1

    # Rule 3: Load balancing with weights for streaming method
    - matches:
        - method:
            type: Exact
            service: test.TestService
            method: StreamNumbers
      backendRefs:
        - name: grpc-service
          port: 30021
          weight: 70
        - name: grpc-service-backup
          port: 30023
          weight: 30

    # Rule 4: RegularExpression match - any TestService methods
    - matches:
        - method:
            type: RegularExpression
            service: "test\\..*"
            method: ".*"
      backendRefs:
        - name: grpc-service
          port: 30021
          weight: 2
        - name: grpc-service-backup
          port: 30023
          weight: 1

    # Rule 5: Match any service (catch-all)
    - matches:
        - method:
            type: RegularExpression
            service: ".*"
      backendRefs:
        - name: grpc-service
          port: 30021

