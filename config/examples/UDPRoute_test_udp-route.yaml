apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: example-udp-route
  namespace: default
spec:
  parentRefs:
    - name: gateway1
      namespace: default
      sectionName: udp-listener
  rules:
    - backendRefs:
        - name: udp-service
          port: 5353
          weight: 1

