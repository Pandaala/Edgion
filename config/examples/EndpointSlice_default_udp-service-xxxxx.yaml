apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: udp-service-xxxxx
  namespace: default
  labels:
    kubernetes.io/service-name: udp-service
addressType: IPv4
ports:
  - name: dns
    port: 5353
    protocol: UDP
endpoints:
  - addresses:
      - "127.0.0.1"  # Backend UDP service IP (for testing)
    conditions:
      ready: true
      serving: true
      terminating: false

