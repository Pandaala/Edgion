apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-route1
  namespace: test1
spec:
  parentRefs:
    - name: gateway1
      namespace: default
      sectionName: https18443

  hostnames:
    - "aaa.example.com"
    - "bbb.example.com"
  rules:
    # 规则1: 使用 ExtensionRef 引用 EdgionPlugins (规则级别)
    - matches:
        - path:
            type: PathPrefix
            value: /aaa/doc/
        - path:
            type: PathPrefix
            value: /aaa/exact
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: common-plugins
      backendRefs:
        - name: aaa-service
          port: 30001

    # 规则2: 使用 ExtensionRef 引用 EdgionPlugins (后端级别)
    - matches:
        - path:
            type: PathPrefix
            value: /bbb/123
        - path:
            type: Exact
            value: /bbb/:id1/ccc/:id2/eee
      backendRefs:
        - name: aaa-service
          port: 30002
          weight: 1
          filters:
            - type: ExtensionRef
              extensionRef:
                group: edgion.io
                kind: EdgionPlugins
                name: common-plugins
        - name: bbb-service
          port: 30003
          weight: 3

    # 规则3: 同时使用规则级别 filter 和 ExtensionRef
    - matches:
        - path:
            type: PathPrefix
            value: /ccc/api/
        - path:
            type: Exact
            value: /ccc/:id1/:id2/ddd
      filters:
        # 规则级别的直接 filter
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Rule-Level
                value: "true"
        # 引用 EdgionPlugins
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: common-plugins
      backendRefs:
        - name: aaa-service
          port: 30002
          kind: Service
          weight: 1
        - name: bbb-service
          port: 30003
          weight: 3
          kind: Service
