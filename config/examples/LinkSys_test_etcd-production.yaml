# Production Etcd Connection (with Authentication and TLS)
# This demonstrates a fully configured etcd client for production use.

apiVersion: edgion.io/v1
kind: LinkSys
metadata:
  name: etcd-production
  namespace: test
spec:
  type: etcd
  etcd:
    # Multiple etcd server endpoints for high availability
    endpoints:
      - "https://etcd-1.example.com:2379"
      - "https://etcd-2.example.com:2379"
      - "https://etcd-3.example.com:2379"
    
    # Authentication configuration
    auth:
      username: "app-user"
      password: "secure-password"
    
    # TLS configuration for secure connections
    tls:
      enabled: true
      insecureSkipVerify: false
      certs:
        caCert: |
          -----BEGIN CERTIFICATE-----
          MIIDXTCCAkWgAwIBAgIJAKL0UG+mRKuFMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
          BAYTAkFVMRMwEQYDVQQIDApTb21lLVN0YXRlMSEwHwYDVQQKDBhJbnRlcm5ldCBX
          aWRnaXRzIFB0eSBMdGQwHhcNMTcwODIyMDUwMzE3WhcNMjcwODIwMDUwMzE3WjBF
          (certificate content truncated for example)
          -----END CERTIFICATE-----
        clientCert: |
          -----BEGIN CERTIFICATE-----
          MIIDXTCCAkWgAwIBAgIJAKL0UG+mRKuFMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
          (certificate content truncated for example)
          -----END CERTIFICATE-----
        clientKey: |
          -----BEGIN PRIVATE KEY-----
          MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQC7VJTUt9Us8cKj
          (key content truncated for example)
          -----END PRIVATE KEY-----
    
    # Timeout configuration (in milliseconds)
    timeout:
      dial: 5000        # 5 seconds to establish connection
      request: 10000    # 10 seconds per request
      keepAlive: 30000  # 30 seconds keep-alive timeout
    
    # HTTP/2 keep-alive configuration (in seconds)
    keepAlive:
      time: 30                  # Send ping every 30 seconds
      timeout: 10               # Ping timeout 10 seconds
      permitWithoutStream: true
    
    # Namespace prefix for all keys
    namespace: "/my-app/"
    
    # Auto-sync cluster members every 300 seconds (5 minutes)
    autoSyncInterval: 300
    
    # gRPC message size limits (in bytes)
    maxCallSendSize: 2097152   # 2MB
    maxCallRecvSize: 4194304   # 4MB
    
    # Client identification
    userAgent: "edgion-gateway/v1.0.0"
    
    # Reject old cluster versions
    rejectOldCluster: true
    
    # Observability configuration
    observability:
      logging:
        enabled: true
        level: "info"
        slowLogThreshold: 1000  # Log operations slower than 1 second
      metrics:
        enabled: true
        labels:
          environment: "production"
          region: "us-west"
          cluster: "primary"

