# Etcd Connection using Kubernetes Secrets
# This demonstrates how to use Kubernetes Secrets for storing credentials and certificates.

apiVersion: edgion.io/v1
kind: LinkSys
metadata:
  name: etcd-with-secret
  namespace: test
spec:
  type: etcd
  config:
    # Etcd server endpoints
    endpoints:
      - "https://etcd.example.com:2379"
    
    # Authentication using Secret reference
    auth:
      secretRef:
        name: etcd-credentials
        namespace: test
        usernameKey: username
        passwordKey: password
    
    # TLS configuration using Secret reference
    tls:
      enabled: true
      certs:
        secretRef:
          name: etcd-tls-certs
          namespace: test
    
    # Timeout configuration
    timeout:
      dial: 5000
      request: 10000
    
    # Keep-alive configuration
    keepAlive:
      time: 30
      timeout: 10
    
    # Namespace for key isolation
    namespace: "/app-config/"
    
    # Observability
    observability:
      logging:
        enabled: true
        level: "info"
      metrics:
        enabled: true

---
# Example Secret for etcd credentials
apiVersion: v1
kind: Secret
metadata:
  name: etcd-credentials
  namespace: test
type: Opaque
stringData:
  username: "my-app-user"
  password: "my-secure-password"

---
# Example Secret for etcd TLS certificates
apiVersion: v1
kind: Secret
metadata:
  name: etcd-tls-certs
  namespace: test
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    (CA certificate content)
    -----END CERTIFICATE-----
  client.crt: |
    -----BEGIN CERTIFICATE-----
    (Client certificate content)
    -----END CERTIFICATE-----
  client.key: |
    -----BEGIN PRIVATE KEY-----
    (Client private key content)
    -----END PRIVATE KEY-----

