apiVersion: edgion.io/v1
kind: LinkSys
metadata:
  name: example-redis
  namespace: default
spec:
  type: redis
  redis:
    # Redis endpoints
    endpoints:
      - "redis://127.0.0.1:6379"
      - "redis://127.0.0.1:6380"
    
    # Authentication
    auth:
      username: "default"
      password: "redis_password"
      # Or use secret reference
      # secretRef:
      #   name: redis-secret
      #   namespace: default
      #   usernameKey: username
      #   passwordKey: password
    
    # Database selection (0-15)
    db: 0
    
    # Timeout configuration (milliseconds)
    timeout:
      connect: 5000
      read: 3000
      write: 3000
    
    # Connection pool
    pool:
      size: 100
      minIdle: 10
    
    # Retry configuration
    retry:
      maxRetries: 3
      backoff:
        type: "exponential"
        initialDelay: 100
        maxDelay: 5000
        multiplier: 2.0
    
    # Topology configuration
    topology:
      mode: standalone
      # For sentinel mode:
      # mode: sentinel
      # sentinel:
      #   masterName: "mymaster"
      #   sentinels:
      #     - "redis://sentinel1:26379"
      #     - "redis://sentinel2:26379"
      #   password: "sentinel_password"
      
      # For cluster mode:
      # mode: cluster
      # cluster:
      #   readFromReplicas: true
      #   maxRedirects: 3
    
    # TLS configuration
    tls:
      enabled: false
      # certs:
      #   caCert: |
      #     -----BEGIN CERTIFICATE-----
      #     ...
      #     -----END CERTIFICATE-----
      #   secretRef:
      #     name: redis-tls-secret
      #     namespace: default
      # insecureSkipVerify: false
    
    # Observability
    observability:
      metrics:
        enabled: true
        labels:
          app: "edgion"
          component: "redis-client"
      logging:
        enabled: true
        level: "info"
        slowLogThreshold: 100

