apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: grpc-service
  namespace: test1
  labels:
    kubernetes.io/service-name: grpc-service
addressType: IPv4
ports:
  - name: grpc-30021
    port: 30021
    protocol: TCP
  - name: grpc-30022
    port: 30022
    protocol: TCP
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true

