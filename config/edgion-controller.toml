# ================================================================================
# Edgion Controller Configuration File
# ================================================================================
# 
# :
#   1. :
#      ./edgion-controller --config /usr/local/edgion/config/edgion-controller.toml
#   
#   2.  ( --config):
#      ./edgion-controller --gateway-class public-gateway
#   
#   3. :
#      ./edgion-controller --config /usr/local/edgion/config/edgion-controller.toml --log-level debug
#
# ================================================================================

# ============================================================================
# Working Directory Configuration
# ============================================================================
# All relative paths in this configuration file will be relative to work_dir.
# Absolute paths will be used as-is.
#
# Priority order:
#   1. Command line: --work-dir /path
#   2. Environment:  EDGION_WORK_DIR=/path
#   3. Config file:  work_dir = "/path"
#   4. Default:      "." (current directory)
#
# Standard directory layout:
#   work_dir/
#   ├── logs/        # Log files
#   ├── runtime/     # Runtime state
#   └── config/      # Configuration files
#
# Examples:
#   Development:  work_dir = "."
#   Production:   work_dir = "/usr/local/edgion"
#   Container:    work_dir = "/usr/local/edgion"
# ============================================================================
work_dir = "."

# K8s mode (optional, can also use CLI --k8s-mode or auto-detect via env)
# K8s （， CLI --k8s-mode ）
# : CLI  >  (KUBERNETES_SERVICE_HOST) >  > (false)
# k8s_mode = false

[server]
# gRPC 
#  Gateway 
grpc_listen = "0.0.0.0:50051"

# Admin HTTP 
# ， Web Dashboard
admin_listen = "0.0.0.0:5800"

[logging]
# 
log_dir = "logs"

# 
# : {log_prefix}.{date}.log
log_prefix = "edgion-controller"

# : trace, debug, info, warn, error
# - trace: ，
# - debug: ，
# - info:  ，
# - warn:  
# - error: 
log_level = "info"

#  JSON 
# true:   JSON ，
# false: 
json_format = false

# （stdout）
# true:   + 
# false: 
console = true

# 
# 
buffer_size = 10000

# ============================================================================
# Configuration Center (conf_center)
# ============================================================================
# Determines which backend to use for configuration management:
#   - file_system: Local YAML files with file watching (development/testing)
#   - kubernetes:  K8s API with resource watching (production)
#
# FileSystem mode example:
# [conf_center]
# type = "file_system"
# conf_dir = "examples/test/conf"  # Directory containing YAML files
#
# Kubernetes mode example (production):
# [conf_center]
# type = "kubernetes"
# gateway_class = "edgion"              # Required: GatewayClass name to manage
# controller_name = "edgion.io/gateway-controller"  # Required: Gateway API controllerName
# watch_namespaces = []                 # Empty = all namespaces, or ["ns1", "ns2"]
# label_selector = ""                   # Optional: filter resources by label
#
# [conf_center.leader_election]
# lease_name = "edgion-controller-leader"    # Lease resource name
# lease_namespace = "edgion-system"          # Namespace for Lease (default: from POD_NAMESPACE env)
# lease_duration_secs = 15                   # Lease validity period
# renew_period_secs = 10                     # How often leader renews lease
# retry_period_secs = 2                      # How often non-leaders retry
#
# [conf_center.metadata_filter]
# blocked_annotations = [                    # Annotations to remove from resources
#   "kubectl.kubernetes.io/last-applied-configuration",
#   "meta.helm.sh/release-name",
#   "meta.helm.sh/release-namespace"
# ]
# remove_managed_fields = true               # Remove managedFields to save memory
# ============================================================================
[conf_center]
type = "file_system"
conf_dir = "examples/test/conf"

[debug]
# 
#  debug  trace ， 30  GatewayClass 
#  false
enabled = true

[conf_sync]
no_sync_kinds = ["ReferenceGrant", "Secret"]
# EventStore ring buffer default capacity for all resource types
default_capacity = 200
