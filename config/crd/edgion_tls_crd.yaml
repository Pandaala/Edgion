apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ztracetls.ztrace.io
spec:
  group: ztrace.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - hosts
                - secret_ref
              properties:
                parent_refs:
                  type: array
                  description: "References to Gateway(s) that this TLS configuration belongs to"
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      group:
                        type: string
                        description: "Group of the referent"
                        default: "gateway.networking.k8s.io"
                      kind:
                        type: string
                        description: "Kind of the referent"
                        default: "Gateway"
                      namespace:
                        type: string
                        description: "Namespace of the referent"
                      name:
                        type: string
                        description: "Name of the referent"
                        minLength: 1
                      section_name:
                        type: string
                        description: "Name of a section within the target Gateway (listener name)"
                      port:
                        type: integer
                        description: "Port of the referent"
                        format: int32
                hosts:
                  type: array
                  description: "List of hostnames/domains for TLS certificates. Supports wildcard prefix (e.g., *.example.com)"
                  items:
                    type: string
                    pattern: '^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                  minItems: 1
                secret_ref:
                  type: object
                  description: "Reference to a Kubernetes Secret containing TLS certificate"
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: "Name of the Secret"
                      minLength: 1
                    namespace:
                      type: string
                      description: "Namespace of the Secret. If not specified, defaults to the same namespace as ZtraceTls"
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Gateway
          type: string
          jsonPath: .spec.parent_refs[0].name
          description: First parent Gateway name
        - name: Hosts
          type: string
          jsonPath: .spec.hosts[0]
          description: First hostname in the list
        - name: Secret
          type: string
          jsonPath: .spec.secret_ref.name
          description: Referenced secret name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: ztracetls
    singular: ztracetls
    kind: ZtraceTls
    shortNames:
      - ztls
