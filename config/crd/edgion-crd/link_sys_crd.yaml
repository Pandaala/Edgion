apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: linksys.edgion.io
spec:
  group: edgion.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: "LinkSys defines connections to external systems"
              required:
                - type
                - config
              properties:
                type:
                  type: string
                  description: "System type"
                  enum: ["redis", "etcd", "elasticsearch", "kafka"]
                config:
                  type: object
                  description: "System-specific configuration"
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    # Common fields for all system types
                    endpoints:
                      type: array
                      description: "Server endpoints"
                      items:
                        type: string
                    auth:
                      type: object
                      description: "Authentication configuration"
                      properties:
                        username:
                          type: string
                          description: "Username"
                        password:
                          type: string
                          description: "Password"
                        secretRef:
                          type: object
                          description: "Secret reference for credentials"
                          properties:
                            name:
                              type: string
                              description: "Name of the secret"
                            namespace:
                              type: string
                              description: "Namespace of the secret"
                            usernameKey:
                              type: string
                              description: "Key in the secret for username"
                            passwordKey:
                              type: string
                              description: "Key in the secret for password"
                    tls:
                      type: object
                      description: "TLS/SSL configuration"
                      properties:
                        enabled:
                          type: boolean
                          description: "Enable TLS"
                          default: false
                        insecureSkipVerify:
                          type: boolean
                          description: "Skip certificate verification (insecure)"
                        certs:
                          type: object
                          description: "TLS certificates"
                          properties:
                            caCert:
                              type: string
                              description: "CA certificate (PEM)"
                            clientCert:
                              type: string
                              description: "Client certificate (PEM)"
                            clientKey:
                              type: string
                              description: "Client key (PEM)"
                            secretRef:
                              type: object
                              description: "Secret reference for certificates"
                              properties:
                                name:
                                  type: string
                                namespace:
                                  type: string
                    timeout:
                      type: object
                      description: "Timeout configuration (milliseconds)"
                      x-kubernetes-preserve-unknown-fields: true
                    # Redis specific
                    db:
                      type: integer
                      description: "Redis database number (0-15)"
                      format: int32
                    pool:
                      type: object
                      description: "Connection pool configuration"
                      properties:
                        size:
                          type: integer
                          format: int32
                        minIdle:
                          type: integer
                          format: int32
                    topology:
                      type: object
                      description: "Redis topology configuration"
                      properties:
                        mode:
                          type: string
                          enum: ["standalone", "sentinel", "cluster"]
                        sentinel:
                          type: object
                          properties:
                            masterName:
                              type: string
                            sentinels:
                              type: array
                              items:
                                type: string
                            password:
                              type: string
                        cluster:
                          type: object
                          properties:
                            readFromReplicas:
                              type: boolean
                            maxRedirects:
                              type: integer
                              format: int32
                    # Etcd specific
                    namespace:
                      type: string
                      description: "Etcd namespace prefix"
                    autoSyncInterval:
                      type: integer
                      description: "Auto-sync cluster members interval (seconds)"
                      format: int64
                    keepAlive:
                      type: object
                      description: "HTTP/2 keep-alive configuration"
                      properties:
                        time:
                          type: integer
                          format: int64
                        timeout:
                          type: integer
                          format: int64
                        permitWithoutStream:
                          type: boolean
                    observability:
                      type: object
                      description: "Observability configuration"
                      properties:
                        metrics:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                            labels:
                              type: object
                              additionalProperties:
                                type: string
                        logging:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                            level:
                              type: string
                            slowLogThreshold:
                              type: integer
                              format: int64
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
          description: "System type"
        - name: Endpoints
          type: string
          jsonPath: .spec.config.endpoints[0]
          description: "First endpoint"
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: linksys
    singular: linksys
    kind: LinkSys
    shortNames:
      - lsys

