apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edgionplugins.edgion.io
spec:
  group: edgion.io
  names:
    kind: EdgionPlugins
    listKind: EdgionPluginsList
    plural: edgionplugins
    singular: edgionplugins
    shortNames:
      - eplugins
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: "EdgionPlugins specification"
              properties:
                # ============================================
                # Request Stage Plugins (async)
                # ============================================
                requestPlugins:
                  type: array
                  description: "Request stage plugins (async)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        description: "Whether this plugin is enabled (default: true)"
                        default: true
                      # --- conditionEnable: define anchor here, reuse below ---
                      conditionEnable: &conditionEnableSchema
                        type: object
                        description: "Simple conditional enable (legacy)"
                        properties:
                          timeBefore:
                            type: string
                            description: "Plugin enabled before this time (RFC3339)"
                      # --- conditions: define anchor here, reuse below ---
                      conditions: &conditionsSchema
                        type: object
                        description: "Advanced plugin conditions for conditional execution"
                        properties:
                          skip:
                            type: array
                            description: "Conditions that will skip plugin execution (OR logic)"
                            items: &conditionSchema
                              type: object
                              description: "A single condition (tagged union with 'type' field)"
                              properties:
                                type:
                                  type: string
                                  description: "Condition type"
                                  enum: [keyExist, keyMatch, timeRange, probability, include, exclude]
                                key: &keyGetSchema
                                  type: object
                                  description: "Key accessor (KeyGet) - source for reading values"
                                  properties:
                                    type:
                                      type: string
                                      description: "Key source type"
                                      enum: [clientIp, header, cookie, query, path, method, ctx, clientIpAndPath, webhook]
                                    name:
                                      type: string
                                      description: "Key name (required for header, cookie, query, ctx)"
                                    webhookRef:
                                      type: string
                                      description: "Reference to LinkSys Webhook resource: 'namespace/name' (required for webhook type)"
                                    extract:
                                      type: object
                                      description: "How to extract key value from webhook response (required for webhook type)"
                                      properties:
                                        source:
                                          type: string
                                          description: "Extraction source"
                                          enum: [header, cookie, body, bodyText]
                                        name:
                                          type: string
                                          description: "Header or cookie name (required for header/cookie source)"
                                        path:
                                          type: string
                                          description: "JSON dot-path (required for body source)"
                                value:
                                  type: string
                                  description: "Exact value to match (keyMatch)"
                                values:
                                  type: array
                                  description: "Multiple values to match (keyMatch, include, exclude)"
                                  items:
                                    type: string
                                regex:
                                  type: array
                                  description: "Regex patterns to match (keyMatch, include, exclude)"
                                  items:
                                    type: string
                                after:
                                  type: string
                                  description: "Time after which condition is true (RFC3339)"
                                before:
                                  type: string
                                  description: "Time before which condition is true (RFC3339)"
                                ratio:
                                  type: number
                                  description: "Probability ratio 0.0-1.0"
                                  minimum: 0.0
                                  maximum: 1.0
                          run:
                            type: array
                            description: "Conditions that must be satisfied to run (AND logic)"
                            items: *conditionSchema
                      type:
                        type: string
                        description: "Plugin type"
                        enum:
                          - BasicAuth
                          - Cors
                          - Csrf
                          - CtxSet
                          - ForwardAuth
                          - IpRestriction
                          - JwtAuth
                          - JweDecrypt
                          - KeyAuth
                          - HmacAuth
                          - HeaderCertAuth
                          - LdapAuth
                          - OpenidConnect
                          - Mock
                          - ProxyRewrite
                          - RateLimit
                          - RateLimitRedis
                          - RealIp
                          - RequestRestriction
                          - RequestHeaderModifier
                          - ResponseHeaderModifier
                          - RequestRedirect
                          - ExtensionRef
                          - ForwardAuth
                          - DebugAccessLogToHeader
                          - DirectEndpoint
                          - DynamicInternalUpstream
                          - DynamicExternalUpstream
                          - AllEndpointStatus
                          - Dsl
                          - RequestMirror
                          - WebhookKeyGet
                      config:
                        type: object
                        description: "Plugin-specific configuration"
                        x-kubernetes-preserve-unknown-fields: true

                # ============================================
                # Upstream Response Filter Stage Plugins (sync)
                # ============================================
                upstreamResponseFilterPlugins:
                  type: array
                  description: "Upstream response filter stage plugins (sync)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                        enum:
                          - ResponseHeaderModifier
                          - ResponseRewrite
                          - DebugAccessLogToHeader
                          - ExtensionRef
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true

                # ============================================
                # Upstream Response Body Filter Stage Plugins (sync)
                # ============================================
                upstreamResponseBodyFilterPlugins:
                  type: array
                  description: "Upstream response body filter stage plugins (sync, bandwidth throttling)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                        enum:
                          - BandwidthLimit
                      config:
                        type: object
                        description: "Plugin-specific configuration"
                        x-kubernetes-preserve-unknown-fields: true

                # ============================================
                # Upstream Response Stage Plugins (async)
                # ============================================
                upstreamResponsePlugins:
                  type: array
                  description: "Upstream response stage plugins (async)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true

            status:
              type: object
              description: "Status of EdgionPlugins"
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time

      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
