apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edgionplugins.edgion.io
spec:
  group: edgion.io
  names:
    kind: EdgionPlugins
    listKind: EdgionPluginsList
    plural: edgionplugins
    singular: edgionplugins
    shortNames:
      - eplugins
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: "EdgionPlugins specification"
              properties:
                # ============================================
                # Reusable Schema Definitions (YAML Anchors)
                # ============================================
                # KeyGet schema - reusable key accessor definition
                x-definitions:
                  keyGet: &keyGetSchema
                    type: object
                    description: "Key accessor (KeyGet) - source for reading values"
                    properties:
                      type:
                        type: string
                        description: "Key source type"
                        enum: [clientIp, header, cookie, query, path, method, ctx, clientIpAndPath]
                      name:
                        type: string
                        description: "Key name (required for header, cookie, query, ctx)"

                  # KeyGet array schema - for multiple keys (e.g., RateLimit composite key)
                  keyGetArray: &keyGetArraySchema
                    type: array
                    description: "Array of key accessors, combined with '_' separator"
                    items: *keyGetSchema

                  # Single condition schema
                  condition: &conditionSchema
                    type: object
                    description: "A single condition (tagged union with 'type' field)"
                    properties:
                      type:
                        type: string
                        description: "Condition type"
                        enum: [keyExist, keyMatch, timeRange, probability, include, exclude]
                      # KeyGet for key-based conditions
                      key: *keyGetSchema
                      # keyMatch specific fields
                      value:
                        type: string
                        description: "Exact value to match (keyMatch)"
                      values:
                        type: array
                        description: "Multiple values to match (keyMatch, include, exclude)"
                        items:
                          type: string
                      regex:
                        type: array
                        description: "Regex patterns to match (keyMatch, include, exclude)"
                        items:
                          type: string
                      # timeRange specific fields
                      after:
                        type: string
                        description: "Time after which condition is true (RFC3339)"
                      before:
                        type: string
                        description: "Time before which condition is true (RFC3339)"
                      # probability specific fields
                      ratio:
                        type: number
                        description: "Probability ratio 0.0-1.0"
                        minimum: 0.0
                        maximum: 1.0

                  # Conditions object (skip/run arrays)
                  conditions: &conditionsSchema
                    type: object
                    description: "Advanced plugin conditions for conditional execution"
                    properties:
                      skip:
                        type: array
                        description: "Conditions that will skip plugin execution (OR logic)"
                        items: *conditionSchema
                      run:
                        type: array
                        description: "Conditions that must be satisfied to run (AND logic)"
                        items: *conditionSchema

                  # Condition enable (legacy)
                  conditionEnable: &conditionEnableSchema
                    type: object
                    description: "Simple conditional enable (legacy)"
                    properties:
                      timeBefore:
                        type: string
                        description: "Plugin enabled before this time (RFC3339)"

                # ============================================
                # Request Stage Plugins (async)
                # ============================================
                requestPlugins:
                  type: array
                  description: "Request stage plugins (async)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        description: "Whether this plugin is enabled (default: true)"
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                        description: "Plugin type"
                        enum:
                          - BasicAuth
                          - Cors
                          - Csrf
                          - CtxSet
                          - ForwardAuth
                          - IpRestriction
                          - JwtAuth
                          - KeyAuth
                          - OpenidConnect
                          - Mock
                          - ProxyRewrite
                          - RateLimit
                          - RealIp
                          - RequestRestriction
                          - RequestHeaderModifier
                          - ResponseHeaderModifier
                          - RequestRedirect
                          - ExtensionRef
                          - ForwardAuth
                          - DebugAccessLogToHeader
                          - DirectEndpoint
                          - DynamicInternalUpstream
                          - AllEndpointStatus
                      config:
                        type: object
                        description: "Plugin-specific configuration"
                        x-kubernetes-preserve-unknown-fields: true

                # ============================================
                # Upstream Response Filter Stage Plugins (sync)
                # ============================================
                upstreamResponseFilterPlugins:
                  type: array
                  description: "Upstream response filter stage plugins (sync)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                        enum:
                          - ResponseHeaderModifier
                          - ResponseRewrite
                          - DebugAccessLogToHeader
                          - ExtensionRef
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true

                # ============================================
                # Upstream Response Body Filter Stage Plugins (sync)
                # ============================================
                upstreamResponseBodyFilterPlugins:
                  type: array
                  description: "Upstream response body filter stage plugins (sync, bandwidth throttling)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                        enum:
                          - BandwidthLimit
                      config:
                        type: object
                        description: "Plugin-specific configuration"
                        x-kubernetes-preserve-unknown-fields: true

                # ============================================
                # Upstream Response Stage Plugins (async)
                # ============================================
                upstreamResponsePlugins:
                  type: array
                  description: "Upstream response stage plugins (async)"
                  items:
                    type: object
                    properties:
                      enable:
                        type: boolean
                        default: true
                      conditionEnable: *conditionEnableSchema
                      conditions: *conditionsSchema
                      type:
                        type: string
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true

            status:
              type: object
              description: "Status of EdgionPlugins"
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time

      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
