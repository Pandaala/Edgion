apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgion-gateway
  namespace: edgion-system
  labels:
    app: edgion-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edgion-gateway
  template:
    metadata:
      labels:
        app: edgion-gateway
    spec:
      containers:
      - name: edgion-gateway
        image: docker.io/pandaala/edgion-gateway:0.1.5
        args:
        - "--config-file"
        - "/usr/local/edgion/config/edgion-gateway.toml"
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP
        - name: http-8080
          containerPort: 8080
          protocol: TCP
        - name: https-8443
          containerPort: 8443
          protocol: TCP
        - name: admin
          containerPort: 5900
          protocol: TCP
        - name: metrics
          containerPort: 5901
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        readinessProbe:
          httpGet:
            path: /ready
            port: 5900
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 6
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /usr/local/edgion/config
          readOnly: true
        - name: logs
          mountPath: /usr/local/edgion/logs
      volumes:
      - name: config
        configMap:
          name: edgion-gateway-config
      - name: logs
        emptyDir: {}
