# HTTPRoute in app namespace referencing Service in backend namespace
# This tests cross-namespace reference with ReferenceGrant
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-route
  namespace: app
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: http
  hostnames:
    - "cross-ns.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Cross-namespace reference to backend/cross-ns-svc
        - name: cross-ns-svc
          namespace: backend
          port: 8080
