# HTTPRoute with multiple parent refs for testing per-parent status
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multi-parent
  namespace: app
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: http
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - "multi.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Cross-namespace reference with ReferenceGrant
        - name: cross-ns-svc
          namespace: backend
          port: 8080
