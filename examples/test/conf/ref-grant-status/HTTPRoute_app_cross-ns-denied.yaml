# HTTPRoute in app namespace referencing Service in another-backend namespace
# This tests cross-namespace reference WITHOUT ReferenceGrant (should be denied)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-denied
  namespace: app
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: http
  hostnames:
    - "denied.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Cross-namespace reference to another-backend/some-svc (no ReferenceGrant exists)
        - name: some-svc
          namespace: another-backend
          port: 8080
