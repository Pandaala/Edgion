apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-denied
  namespace: app
spec:
  parentRefs:
    - name: public-gateway
      namespace: edgion-test
  hostnames:
    - cross-ns-denied.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # This references a service in 'other' namespace without ReferenceGrant
        - name: some-svc
          namespace: other
          port: 80
