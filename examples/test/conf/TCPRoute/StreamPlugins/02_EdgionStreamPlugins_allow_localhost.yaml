# EdgionStreamPlugins: allow localhost only
# Key regression test: proves real client IP is extracted (not hardcoded "0.0.0.0")
# - Old code (0.0.0.0): does NOT match 127.0.0.0/8 → DENY (bug)
# - Fixed code (127.0.0.1): matches 127.0.0.0/8 → ALLOW (correct)
apiVersion: edgion.io/v1
kind: EdgionStreamPlugins
metadata:
  name: tcp-allow-localhost
  namespace: edgion-test
spec:
  plugins:
    - type: IpRestriction
      config:
        defaultAction: deny
        allow:
          - "127.0.0.0/8"
