apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dynamic-test-gateway
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
  # Listener 1:  hostname ， hostname 
  - name: http-with-hostname
    port: 31250
    protocol: HTTP
    hostname: api.example.com
  # Listener 2:  listener， HTTPRoute 
  - name: http-general
    port: 31251
    protocol: HTTP
