apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-method-test
  namespace: edgion-test
spec:
  parentRefs:
  - name: dynamic-test-gateway
    namespace: edgion-test
    sectionName: http-general
  hostnames:
  - "method-test.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1
      method: GET
    backendRefs:
    - name: test-backend
      port: 8080
