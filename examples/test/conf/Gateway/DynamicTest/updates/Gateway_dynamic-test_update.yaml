apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dynamic-test-gateway
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
  # Listener 1: 移除 hostname 限制
  - name: http-with-hostname
    port: 31250
    protocol: HTTP
    # hostname 已移除，现在接受任何 hostname
  # Listener 2: 保持不变
  - name: http-general
    port: 31251
    protocol: HTTP
