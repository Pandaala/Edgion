# 通配符不匹配根域名测试（负面测试）
# *.wildcard.example.com 不应匹配 wildcard.example.com（根域名）
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-root-mismatch-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-wildcard
  hostnames:
    - "wildcard.example.com"  # 根域名，不应匹配 *.wildcard.example.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
