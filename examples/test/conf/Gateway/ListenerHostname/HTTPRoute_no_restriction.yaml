# 无 Hostname 限制测试
# Listener 未指定 hostname，应允许任意 HTTPRoute hostname
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: no-restriction-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-no-restriction
  hostnames:
    - "any-domain.example.com"  # Listener 无限制，任意 hostname 都应允许
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
