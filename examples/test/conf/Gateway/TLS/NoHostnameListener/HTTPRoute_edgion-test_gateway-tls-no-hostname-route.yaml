# Route attached to a listener without hostname, used to verify TLS cert matching rejects it
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-tls-no-hostname-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: gateway-tls-no-hostname
      namespace: edgion-test
      sectionName: https
  hostnames:
    - no-hostname-gateway-tls.test.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
