#  2: Hostname  Different Namespace（）
# Route  namespace，hostname  allowedRoutes 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-hostname-diff-ns
  namespace: edgion-default
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-hostname-same-ns
  hostnames:
    - "www.combined.example.com"  #  *.combined.example.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
