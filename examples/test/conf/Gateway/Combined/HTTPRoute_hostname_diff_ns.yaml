# 组合测试 2: Hostname 匹配但 Different Namespace（负面测试）
# Route 在不同 namespace，hostname 匹配但 allowedRoutes 限制应拒绝
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-hostname-diff-ns
  namespace: edgion-default
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-hostname-same-ns
  hostnames:
    - "www.combined.example.com"  # 匹配 *.combined.example.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
