# 组合测试 1: Hostname 匹配 + Same Namespace（正面测试）
# Route 在同 namespace 且 hostname 匹配通配符
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-hostname-same-ns-match
  namespace: edgion-test
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-hostname-same-ns
  hostnames:
    - "api.combined.example.com"  # 匹配 *.combined.example.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
