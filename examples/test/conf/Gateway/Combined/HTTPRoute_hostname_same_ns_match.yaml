#  1: Hostname  + Same Namespace（）
# Route  namespace  hostname 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-hostname-same-ns-match
  namespace: edgion-test
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-hostname-same-ns
  hostnames:
    - "api.combined.example.com"  #  *.combined.example.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
