# 组合测试 4: sectionName + Hostname 匹配（正面测试）
# Route 绑定到 secure listener，hostname 匹配
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-section-hostname-match
  namespace: edgion-test
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-secure
  hostnames:
    - "secure.combined.example.com"  # 精确匹配 listener hostname
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
