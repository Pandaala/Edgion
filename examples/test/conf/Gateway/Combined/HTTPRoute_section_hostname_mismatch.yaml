# 组合测试 5: sectionName + Hostname 不匹配（负面测试）
# Route 绑定到 secure listener，但 hostname 不匹配
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-section-hostname-mismatch
  namespace: edgion-test
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-secure
  hostnames:
    - "other.combined.example.com"  # 不匹配 listener hostname
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
