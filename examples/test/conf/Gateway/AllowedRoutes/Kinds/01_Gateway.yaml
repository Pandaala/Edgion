# AllowedRoutes Kinds 测试
# Gateway 配置 allowedRoutes.kinds 只允许 HTTPRoute
# GRPCRoute 应被拒绝
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: allowed-routes-kinds-gateway
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 31213
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute  # 只允许 HTTPRoute
