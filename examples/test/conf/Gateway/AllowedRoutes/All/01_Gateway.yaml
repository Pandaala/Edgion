# AllowedRoutes All Namespaces 测试
# Gateway 配置 allowedRoutes.namespaces.from: All
# 允许所有 namespace 的 Route 连接
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: allowed-routes-all-gateway
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 31211
      allowedRoutes:
        namespaces:
          from: All  # 允许所有 namespace 的 Route
