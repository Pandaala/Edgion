# Cross namespace HTTPRoute for Selector test
# Cross-namespace routes should also be denied when namespace labels are unavailable
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: selector-cross-ns-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: allowed-routes-selector-gateway
      namespace: edgion-test
  hostnames:
    - "selector-cross-ns.example.com"
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
