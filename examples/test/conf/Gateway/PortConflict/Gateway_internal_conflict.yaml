# Test: Single Gateway Internal Port Conflict
# Two Listeners on the same Gateway using the same port
# Both should be marked as Conflicted=True
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: port-conflict-internal
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
    # Listener 1: HTTP on port 31260
    - name: http-1
      protocol: HTTP
      port: 31260

    # Listener 2: HTTP on same port 31260 (CONFLICT!)
    - name: http-2
      protocol: HTTP
      port: 31260
