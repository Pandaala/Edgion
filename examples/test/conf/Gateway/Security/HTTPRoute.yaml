# Security 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: security-test
  namespace: edgion-test
spec:
  parentRefs:
    - name: security-gateway
      namespace: edgion-test
  hostnames:
    - "test.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: test-http
          port: 30001
