# EdgionStreamPlugins: allow all IPs (for ConnectionFilter positive testing)
# Verifies that a filter with allow-all policy does NOT block connections
apiVersion: edgion.io/v1
kind: EdgionStreamPlugins
metadata:
  name: allow-all-ips
  namespace: edgion-test
spec:
  plugins:
    - type: IpRestriction
      config:
        defaultAction: allow
