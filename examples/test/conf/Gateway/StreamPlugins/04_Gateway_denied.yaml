# Gateway with deny-all ConnectionFilter
# TCP listener on port 31271 — connections blocked at TCP level
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: stream-plugins-denied-gw
  namespace: edgion-test
  annotations:
    edgion.io/edgion-stream-plugins: "edgion-test/deny-all-ips"
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: tcp
      protocol: TCP
      port: 31271
