# HTTPRoute bound to port-b listener (31301) only
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-port-b
  namespace: edgion-test
spec:
  parentRefs:
    - name: multiport-gateway
      namespace: edgion-test
      sectionName: http-port-b
      port: 31301
  hostnames:
    - "port-b.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /echo
      backendRefs:
        - name: test-http
          port: 30001
