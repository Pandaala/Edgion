# 单 EndpointSlice, 3 个 endpoints - RoundRobin 测试
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: lb-rr-single
  namespace: edgion-default
  labels:
    kubernetes.io/service-name: lb-rr-service
addressType: IPv4
ports:
  - name: http
    port: 30001
    protocol: TCP
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true
  - addresses:
      - "127.0.0.2"
    conditions:
      ready: true
  - addresses:
      - "127.0.0.3"
    conditions:
      ready: true
