apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: hc-transition-slice
  namespace: edgion-default
  labels:
    kubernetes.io/service-name: hc-transition
addressType: IPv4
ports:
  - name: http
    port: 30001
    protocol: TCP
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true
