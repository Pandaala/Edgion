#  Slice  - Slice 1 (2 endpoints)
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: lb-ch-multi-1
  namespace: edgion-default
  labels:
    kubernetes.io/service-name: lb-ch-multi-service
addressType: IPv4
ports:
  - name: http
    port: 30001
    protocol: TCP
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true
  - addresses:
      - "127.0.0.2"
    conditions:
      ready: true
