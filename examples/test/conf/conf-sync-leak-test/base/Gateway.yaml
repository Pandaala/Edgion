apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: leak-test-gateway
  namespace: edgion-test
  annotations:
    edgion.io/backend-protocol: "tcp"
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 31290
    - name: grpc
      protocol: HTTP
      port: 31291
    - name: tcp
      protocol: TCP
      port: 31292
    - name: udp
      protocol: UDP
      port: 31293
    - name: tls
      protocol: TLS
      port: 31294
      tls:
        mode: Terminate
        options:
          edgion.io/cert-provider: "EdgionTls"
        certificateRefs: []
      hostname: "*.leak-test.example.com"
