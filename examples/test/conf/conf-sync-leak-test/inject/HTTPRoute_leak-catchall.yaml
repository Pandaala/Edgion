apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: leak-catchall
  namespace: edgion-test
spec:
  parentRefs:
    - name: leak-test-gateway
      namespace: edgion-test
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /catchall
      backendRefs:
        - name: leak-svc
          port: 30001
