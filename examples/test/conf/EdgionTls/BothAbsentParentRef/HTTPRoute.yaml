# HTTPRoute for EdgionTls BothAbsentParentRef testing.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: edgiontls-both-absent-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: edgiontls-both-absent-gw
      namespace: edgion-test
  hostnames:
    - "both-absent-tls.example.com"
  rules:
    - backendRefs:
        - name: test-http
          port: 30001
