# Gateway for EdgionTls BothAbsentParentRef testing.
# HTTPS listener — EdgionTls references this Gateway without sectionName or port.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: edgiontls-both-absent-gw
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: https
      protocol: HTTPS
      port: 31290
      hostname: "both-absent-tls.example.com"
      allowedRoutes:
        namespaces:
          from: All
