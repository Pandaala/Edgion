apiVersion: edgion.io/v1
kind: EdgionTls
metadata:
  name: mtls-test-san
  namespace: edgion-test
spec:
  parentRefs:
    - name: mtls-test-gateway
      namespace: edgion-test
      sectionName: https-mtls
  hosts:
    - mtls-san.example.com
  secretRef:
    name: mtls-server
    namespace: edgion-test
  clientAuth:
    mode: Mutual
    caSecretRef:
      name: client-ca
      namespace: edgion-test
    verifyDepth: 1
    allowedSans:
      - "client1.example.com"

