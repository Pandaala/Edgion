apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-cross-ns
  namespace: edgion-test
spec:
  # Allow routes from edgion-default to reference Services in edgion-test
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: edgion-default
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      namespace: edgion-default
  to:
    - group: ""
      kind: Service
