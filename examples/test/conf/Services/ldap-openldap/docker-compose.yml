services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: edgion-test-openldap
    environment:
      LDAP_ORGANISATION: "Edgion Test"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "false"
      LDAP_LOG_LEVEL: "256"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    ports:
      - "33890:389"
    healthcheck:
      test: ["CMD-SHELL", "ldapwhoami -x -H ldap://127.0.0.1:389 -D cn=admin,dc=example,dc=org -w admin | grep -q '^dn:'"]
      interval: 5s
      timeout: 3s
      retries: 12
