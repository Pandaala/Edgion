apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: diu-backend-canary-slice
  namespace: default
  labels:
    kubernetes.io/service-name: diu-backend-canary
addressType: IPv4
ports:
  - name: http
    port: 30002
    protocol: TCP
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true
