# HTTPRoute for AllEndpointStatus with response headers test
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: all-endpoint-status-headers-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "all-endpoint-status-headers.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: all-endpoint-status-headers
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
