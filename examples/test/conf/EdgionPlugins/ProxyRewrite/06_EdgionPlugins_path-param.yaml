# 6. Path ：$uid  URI  Header 
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: proxy-rewrite-path-param
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: ProxyRewrite
      config:
        uri: "/user-service/$uid/profile"
        headers:
          set:
            - name: X-User-Id
              value: "$uid"

