# EdgionPlugins 配置 - 覆盖所有 Condition 类型测试
# 
# Condition 类型:
# 1. keyExist - 检查键是否存在 (header, query, cookie, method, path)
# 2. keyMatch - 检查键值匹配 (精确值/正则)
# 3. timeRange - 时间范围检查
# 4. probability - 概率执行
# 5. include - 包含条件
# 6. exclude - 排除条件
#
# 使用 Mock 插件来测试条件，通过检查 X-Debug-Access-Log 中的 cond_skip 字段验证

apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: condition-all-types
  namespace: edgion-default
spec:
  requestPlugins:
    # =========================================================================
    # 1. KeyExist Tests - 检查键是否存在
    # =========================================================================
    
    # 1.1 KeyExist + Header source (skip when X-Skip-KeyExist-Header exists)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyExist-Header-Ran: "true"
        # 不设置 body，让请求继续
      conditions:
        skip:
          - type: keyExist
            key:
              type: header
              name: "X-Skip-KeyExist-Header"

    # 1.2 KeyExist + Query source (skip when ?skip_query=1 exists)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyExist-Query-Ran: "true"
      conditions:
        skip:
          - type: keyExist
            key:
              type: query
              name: "skip_query"

    # 1.3 KeyExist + Cookie source (run when session_id cookie exists)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyExist-Cookie-Ran: "true"
      conditions:
        run:
          - type: keyExist
            key:
              type: cookie
              name: "session_id"

    # =========================================================================
    # 2. KeyMatch Tests - 检查键值匹配
    # =========================================================================
    
    # 2.1 KeyMatch exact value (run when X-Env: production)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyMatch-Exact-Ran: "true"
      conditions:
        run:
          - type: keyMatch
            key:
              type: header
              name: "X-Env"
            value: "production"

    # 2.2 KeyMatch regex (run when User-Agent matches ^TestBot.*)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyMatch-Regex-Ran: "true"
      conditions:
        run:
          - type: keyMatch
            key:
              type: header
              name: "User-Agent"
            regex:
              - "^TestBot.*"

    # 2.3 KeyMatch query param (run when version=v2)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyMatch-Query-Ran: "true"
      conditions:
        run:
          - type: keyMatch
            key:
              type: query
              name: "version"
            value: "v2"

    # 2.4 KeyMatch with multiple regex patterns (run when UA matches Mozilla OR Chrome OR Safari)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyMatch-MultiRegex-Ran: "true"
      conditions:
        run:
          - type: keyMatch
            key:
              type: header
              name: "User-Agent"
            regex:
              - "^Mozilla.*"
              - "^Chrome.*"
              - "(?i:^safari.*)"   # case-insensitive

    # 2.5 KeyMatch with multiple exact values (run when X-Region is us-east OR us-west OR eu-west)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-KeyMatch-MultiValues-Ran: "true"
      conditions:
        run:
          - type: keyMatch
            key:
              type: header
              name: "X-Region"
            values:
              - "us-east"
              - "us-west"
              - "eu-west"
              - "ap-northeast"

    # =========================================================================
    # 3. TimeRange Tests - 时间范围检查
    # =========================================================================
    
    # 3.1 TimeRange valid (always runs - wide time range)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-TimeRange-Valid-Ran: "true"
      conditions:
        run:
          - type: timeRange
            after: "2020-01-01T00:00:00Z"
            before: "2099-12-31T23:59:59Z"

    # 3.2 TimeRange expired (never runs - time already passed)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-TimeRange-Expired-Ran: "true"
      conditions:
        run:
          - type: timeRange
            after: "2020-01-01T00:00:00Z"
            before: "2020-12-31T23:59:59Z"

    # =========================================================================
    # 4. Probability Tests - 概率执行
    # =========================================================================
    
    # 4.1 Probability 100% (always runs)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Probability-100-Ran: "true"
      conditions:
        run:
          - type: probability
            ratio: 1.0

    # 4.2 Probability 0% (never runs)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Probability-0-Ran: "true"
      conditions:
        run:
          - type: probability
            ratio: 0.0

    # 4.3 Probability deterministic (based on X-User-ID header)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Probability-Deterministic-Ran: "true"
      conditions:
        run:
          - type: probability
            ratio: 0.5
            key:
              type: header
              name: "X-User-ID"

    # =========================================================================
    # 5. Include Tests - 包含条件
    # =========================================================================
    
    # 5.1 Include path (run for /api/* paths)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Include-Path-Ran: "true"
      conditions:
        run:
          - type: include
            key:
              type: path
            values:
              - "/api/*"
              - "/v1/*"

    # 5.2 Include method (run for POST, PUT methods)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Include-Method-Ran: "true"
      conditions:
        run:
          - type: include
            key:
              type: method
            values:
              - "POST"
              - "PUT"

    # 5.3 Include with regex patterns (run for /api/v[0-9]+/* or /internal/*)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Include-Regex-Ran: "true"
      conditions:
        run:
          - type: include
            key:
              type: path
            values:
              - "/static/*"
            regex:
              - "^/api/v[0-9]+/.*"
              - "(?i:^/internal/.*)"   # case-insensitive

    # =========================================================================
    # 6. Exclude Tests - 排除条件
    # =========================================================================
    
    # 6.1 Exclude path (skip for /health, /ready, /metrics)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Exclude-Path-Ran: "true"
      conditions:
        skip:
          - type: exclude
            key:
              type: path
            values:
              - "/health"
              - "/ready"
              - "/metrics"

    # 6.2 Exclude method (skip for OPTIONS requests)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Exclude-Method-Ran: "true"
      conditions:
        skip:
          - type: exclude
            key:
              type: method
            values:
              - "OPTIONS"

    # 6.3 Exclude with regex patterns (skip for /debug/* or /admin/*)
    - enable: true
      type: Mock
      config:
        statusCode: 200
        headers:
          X-Exclude-Regex-Ran: "true"
      conditions:
        skip:
          - type: exclude
            key:
              type: path
            values:
              - "/health"
            regex:
              - "^/debug/.*"
              - "^/admin/.*"

  # DebugAccessLogToHeader - 必须放在 upstreamResponseFilterPlugins 中
  # 用于获取插件执行日志
  upstreamResponseFilterPlugins:
    - enable: true
      type: DebugAccessLogToHeader
      config: {}
