apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: edgion-default
type: Opaque
stringData:
  keys.yaml: |
    - key: "test-key-jack-12345"
      X-Consumer-Username: "jack"
      X-Customer-ID: "cust-001"
      X-User-Tier: "premium"
    - key: "test-key-alice-67890"
      X-Consumer-Username: "alice"
      X-Customer-ID: "cust-002"
      X-User-Tier: "basic"
    - key: "test-key-service-abcde"
      X-Consumer-Username: "payment-service"
      X-Customer-ID: "svc-payment"
      X-User-Tier: "internal"
