# HTTPRoute for DSL Deny Path 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dsl-deny-path-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "dsl-deny-path.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /test/dsl-deny-path
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: dsl-deny-path
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
