# DSL Plugin - Path Deny 测试
# 如果请求路径包含 "/admin"，返回 403；否则放行
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: dsl-deny-path
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: Dsl
      config:
        name: "deny-path"
        source: |
          let path = req.path()
          if path.contains("/admin") {
            return deny(403, "admin access denied")
          }
        maxSteps: 5000
        errorPolicy: deny
