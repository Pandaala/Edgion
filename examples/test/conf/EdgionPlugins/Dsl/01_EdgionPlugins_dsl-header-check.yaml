# DSL Plugin - Header Check 测试
# 检查 X-Api-Token 请求头是否存在，缺少则返回 403
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: dsl-header-check
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: Dsl
      config:
        name: "header-check"
        source: |
          let token = req.header("X-Api-Token")
          if token == nil {
            return deny(403, "missing X-Api-Token header")
          }
        errorPolicy: deny
