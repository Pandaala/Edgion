# 1. Header 拒绝列表 - 阻止 Bot User-Agent
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: request-restriction-header-deny
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: RequestRestriction
      config:
        rules:
          - name: "block-bots"
            source: Header
            key: "User-Agent"
            denyRegex:
              - "(?i).*Bot.*"
              - "(?i).*Spider.*"
              - "(?i).*Crawler.*"
            onMissing: Allow
        status: 403
        message: "Bot access denied"
  upstreamResponseFilterPlugins:
    - enable: true
      type: DebugAccessLogToHeader
      config: {}
