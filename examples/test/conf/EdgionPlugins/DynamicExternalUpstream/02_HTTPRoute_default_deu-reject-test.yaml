# HTTPRoute for DynamicExternalUpstream reject mode test
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deu-reject-test
  namespace: default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
      sectionName: http  # Port 31180
  hostnames:
    - "deu-reject-test.example.com"
  rules:
    - backendRefs:
        - name: deu-fallback
          port: 30001
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: deu-reject
