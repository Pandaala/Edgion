# EdgionPlugins 测试套件统一 Gateway
# 所有 EdgionPlugins 测试共用此 Gateway，避免每个插件开一个 Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: edgion-plugins-gateway
  namespace: edgion-test
  annotations:
    edgion.io/metrics-test-type: "latency"
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 31180
