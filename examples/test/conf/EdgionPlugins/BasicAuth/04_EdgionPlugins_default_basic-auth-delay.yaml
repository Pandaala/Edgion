# BasicAuth with authFailureDelayMs = 300ms
# After an authentication failure (401), the response is delayed 300ms
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: basic-auth-delay
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: BasicAuth
      config:
        realm: "Test Realm"
        authFailureDelayMs: 300
        secretRefs:
          - name: basic-auth-alice
            namespace: edgion-default
          - name: basic-auth-bob
            namespace: edgion-default
