apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: rate-limit-redis-main
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: RateLimitRedis
      config:
        redisRef: "default/redis-test"
        policies:
          - rate: 3
            interval: "10s"
            algorithm: SlidingWindow
        key:
          - type: header
            name: "X-Rate-Key"
        onMissingKey: Allow
        onRedisFailure: Allow
        rejectStatus: 429
        rejectMessage: "Redis rate limit exceeded"
        showLimitHeaders: true
        keyPrefix: "edgion:it:rlr:main:"
