apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: ldap-auth-basic-scheme
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: LdapAuth
      config:
        ldapHost: "127.0.0.1"
        ldapPort: 33890
        baseDn: "ou=people,dc=example,dc=org"
        attribute: "uid"
        headerType: "basic"
        timeout: 3000
