# HTTPRoute for RateLimiter 集成测试
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rate-limiter-test-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "rate-limiter.example.com"
  rules:
    # 1. 基于 Header Key 的限流测试
    - matches:
        - path:
            type: PathPrefix
            value: /test/rate-limit
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: rate-limiter-header-key
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
