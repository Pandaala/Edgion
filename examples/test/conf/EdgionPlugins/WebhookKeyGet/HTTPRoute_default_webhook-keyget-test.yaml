# HTTPRoute for WebhookKeyGet integration test
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webhook-keyget-test-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "webhook-keyget.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /test/webhook-keyget
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: webhook-ctx-set-test
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
