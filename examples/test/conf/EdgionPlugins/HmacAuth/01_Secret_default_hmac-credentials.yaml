apiVersion: v1
kind: Secret
metadata:
  name: hmac-credentials
  namespace: edgion-default
type: Opaque
stringData:
  credentials.yaml: |
    - username: alice
      secret: "alice-hmac-secret-key-must-be-at-least-32-bytes-long"
      headers:
        X-Consumer-Username: alice
        X-Customer-ID: cust-001
        X-Team: backend
    - username: bob
      secret: "bob-hmac-secret-key-must-be-at-least-32-bytes-long-too"
      headers:
        X-Consumer-Username: bob
        X-Customer-ID: cust-002
        X-Team: frontend
