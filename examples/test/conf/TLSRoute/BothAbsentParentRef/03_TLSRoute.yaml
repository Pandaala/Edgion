# TLSRoute for BothAbsentParentRef testing.
# parentRef has ONLY name + namespace — no sectionName, no port.
# Per Gateway API spec, this should attach to ALL listeners of the Gateway.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: tls-route-both-absent
  namespace: edgion-test
spec:
  parentRefs:
    - name: tls-route-both-absent-gw
      namespace: edgion-test
  hostnames:
    - "*.both-absent.example.com"
  rules:
    - backendRefs:
        - name: test-tcp
          port: 30010
          weight: 100
