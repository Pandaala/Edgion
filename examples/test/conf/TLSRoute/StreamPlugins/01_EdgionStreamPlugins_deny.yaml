# EdgionStreamPlugins: deny all IPs
# Tests that stream plugin at TLSRoute level correctly denies connections
apiVersion: edgion.io/v1
kind: EdgionStreamPlugins
metadata:
  name: tls-deny-all
  namespace: edgion-test
spec:
  plugins:
    - type: IpRestriction
      config:
        defaultAction: deny
        message: "Blocked by TLSRoute stream plugin"
