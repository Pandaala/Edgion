# TLSRoute with allow-localhost stream plugin
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: tls-sp-allow-localhost
  namespace: edgion-test
  annotations:
    edgion.io/edgion-stream-plugins: "edgion-test/tls-allow-localhost"
spec:
  parentRefs:
    - name: tls-stream-plugins-gw
      namespace: edgion-test
      sectionName: tls-allow-localhost
  hostnames:
    - "*.sp-allow.example.com"
  rules:
    - backendRefs:
        - name: test-tcp
          port: 30010
          weight: 100
