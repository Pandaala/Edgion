apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: timeout-client
  namespace: edgion-default
spec:
  parentRefs:
    - name: timeout-gateway
      namespace: edgion-test
  hostnames:
    - "timeout-client.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: timeout-debug
      timeouts:
        backendRequest: "100s"   # 设置长超时，避免后端先超时
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001

