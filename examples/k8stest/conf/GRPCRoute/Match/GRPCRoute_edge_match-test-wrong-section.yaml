apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: match-test-wrong-section
  namespace: edgion-test
spec:
  parentRefs:
    - name: grpc-match-gateway
      namespace: edgion-test
      sectionName: https  # Wrong! We'll access via HTTP listener

  hostnames:
    - "grpc-section-wrong.example.com"

  rules:
    # This route should NOT match when accessed via HTTP listener (sectionName mismatch)
    - matches:
        - method:
            type: Exact
            service: test.TestService
            method: SayHello
      backendRefs:
        - name: test-grpc
          port: 30021

