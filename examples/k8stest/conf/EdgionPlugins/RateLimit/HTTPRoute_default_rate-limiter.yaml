# HTTPRoute for RateLimit 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rate-limit-test-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "rate-limit.example.com"
  rules:
    # 1.  Header Key 
    - matches:
        - path:
            type: PathPrefix
            value: /test/rate-limit
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: rate-limit-header-key
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
