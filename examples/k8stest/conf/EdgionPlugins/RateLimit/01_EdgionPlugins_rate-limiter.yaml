# RateLimit 插件配置 - 基于 Header 的限流测试
# 使用 X-Rate-Key header 作为限流维度，便于测试不同 key 的独立限流
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: rate-limit-header-key
  namespace: edgion-default
spec:
  requestPlugins:
    # 单 key 限流示例
    - enable: true
      type: RateLimit
      config:
        rate: 5              # 每个窗口最多 5 个请求
        interval: "10s"      # 10 秒窗口
        key:                 # 支持单 key 或多 key 数组
          - type: header
            name: "X-Rate-Key"
        onMissingKey: Allow  # 缺少 key 时放行
        rejectStatus: 429
        rejectMessage: "Rate limit exceeded - try again later"
        showLimitHeaders: true

    # 多 key 联合限流示例（按 IP + API Key + Path 组合限流）
    - enable: false          # 默认禁用，仅作示例
      type: RateLimit
      config:
        rate: 100
        interval: "1m"
        key:                 # 多 key 组合，使用 "_" 连接
          - type: clientIp
          - type: header
            name: "X-API-Key"
          - type: path
        onMissingKey: Allow
        rejectStatus: 429
        rejectMessage: "API rate limit exceeded"
        showLimitHeaders: true


