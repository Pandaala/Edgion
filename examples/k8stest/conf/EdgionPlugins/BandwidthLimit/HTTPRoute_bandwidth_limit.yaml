# BandwidthLimit Integrated Test Route
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bandwidth-limit-test-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "bandwidth-limit.example.com"
  rules:
    # 1. Functional Compliance Test
    - matches:
        - path:
            type: PathPrefix
            value: /test/bandwidth-limit/compliance
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /echo
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: bandwidth-limit-compliance
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001

    # 2. Metrics Verification Test
    - matches:
        - path:
            type: PathPrefix
            value: /test/bandwidth-limit/metrics
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /echo
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: bandwidth-limit-metrics
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
