apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plugin-logs-test-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "plugin-test.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: debug-access-log-test
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001

