# EdgionPlugins  Gateway
#  EdgionPlugins  Gateway， Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: edgion-plugins-gateway
  namespace: edgion-test
  annotations:
    edgion.io/metrics-test-type: "latency"
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 31180
      allowedRoutes:
        namespaces:
          from: All
