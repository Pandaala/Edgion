# HTTPRoute for DynamicExternalUpstream skip mode test
# Normal backend (test-http:30001) is used as fallback when skip
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deu-skip-test
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
      sectionName: http  # Port 31180
  hostnames:
    - "deu-skip-test.example.com"
  rules:
    - backendRefs:
        - name: deu-fallback
          port: 30001
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: deu-skip
