# AllEndpointStatus plugin - basic test configuration
# Queries all backend endpoints and returns aggregated status JSON
apiVersion: edgion.io/v1
kind: EdgionPlugins
metadata:
  name: all-endpoint-status-test
  namespace: edgion-default
spec:
  requestPlugins:
    - enable: true
      type: AllEndpointStatus
      config:
        timeoutMs: 3000
        wallTimeoutMs: 8000
        maxEndpoints: 10
        maxBodySize: 8192
        concurrencyLimit: 5
        includeResponseHeaders: false
        pathOverride: "/health"
