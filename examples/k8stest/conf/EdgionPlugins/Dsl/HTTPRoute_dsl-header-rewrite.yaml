# HTTPRoute for DSL Header Rewrite 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dsl-header-rewrite-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: edgion-plugins-gateway
      namespace: edgion-test
  hostnames:
    - "dsl-header-rewrite.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /test/dsl-header-rewrite
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: dsl-header-rewrite
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
