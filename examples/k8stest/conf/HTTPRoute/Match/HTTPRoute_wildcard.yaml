apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-test
  namespace: edgion-default
spec:
  parentRefs:
    - name: http-match-gateway
      namespace: edgion-test
  hostnames:
    - "*.wc-match-test.example.com"  # Keep aligned with the shared Match suite
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /wildcard-test
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
