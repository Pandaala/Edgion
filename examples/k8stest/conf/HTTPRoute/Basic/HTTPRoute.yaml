# HTTP 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-http
  namespace: edgion-test
spec:
  parentRefs:
    - name: http-test-gateway
      namespace: edgion-test

  hostnames:
    - "test.example.com"
  
  rules:
    # 1: （）
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001

    # 2: Echo （）
    - matches:
        - path:
            type: PathPrefix
            value: /echo
      backendRefs:
        - name: test-http
          port: 30001

    # 3: Headers （）-  Real IP 
    - matches:
        - path:
            type: Exact
            value: /headers
      backendRefs:
        - name: test-http
          port: 30001

    # 4: Status （）
    - matches:
        - path:
            type: PathPrefix
            value: /status/
      backendRefs:
        - name: test-http
          port: 30001

    # 5: Delay （）
    - matches:
        - path:
            type: PathPrefix
            value: /delay/
      backendRefs:
        - name: test-http
          port: 30001

    # 6: WebSocket （）
    - matches:
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: test-websocket
          port: 30005

    # 7: API （）
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: test-http
          port: 30001

    # 8: HTTPS 
    - matches:
        - path:
            type: PathPrefix
            value: /secure/
      backendRefs:
        - name: test-http
          port: 30001
