# TCPRoute with allow-localhost stream plugin (regression test for IP extraction)
# Uses full "namespace/name" format
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tcp-sp-allow-localhost
  namespace: edgion-test
  annotations:
    edgion.io/edgion-stream-plugins: "edgion-test/tcp-allow-localhost"
spec:
  parentRefs:
    - name: tcp-stream-plugins-gw
      namespace: edgion-test
      sectionName: tcp-allow-localhost
      port: 31274
  rules:
    - backendRefs:
        - name: test-tcp
          port: 30010
          weight: 100
