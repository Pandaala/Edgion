#  Hostname 
# Listener  hostname， HTTPRoute hostname
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: no-restriction-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-no-restriction
  hostnames:
    - "any-domain.example.com"  # Listener ， hostname 
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
