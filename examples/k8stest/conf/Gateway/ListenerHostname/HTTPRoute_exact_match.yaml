#  Hostname 
# HTTPRoute hostname  Listener hostname
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: exact-match-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-exact
  hostnames:
    - "api.example.com"  #  listener hostname
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
