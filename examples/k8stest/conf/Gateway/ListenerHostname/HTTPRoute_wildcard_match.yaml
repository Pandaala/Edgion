# 通配符 Hostname 匹配测试
# HTTPRoute hostname 匹配 Listener 通配符 hostname
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-match-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-wildcard
  hostnames:
    - "api.wildcard.example.com"  # 匹配 *.wildcard.example.com
    - "www.wildcard.example.com"  # 也匹配
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
