#  Hostname 
# HTTPRoute hostname  Listener  hostname
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-match-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-wildcard
  hostnames:
    - "api.wildcard.example.com"  #  *.wildcard.example.com
    - "www.wildcard.example.com"  # 
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
