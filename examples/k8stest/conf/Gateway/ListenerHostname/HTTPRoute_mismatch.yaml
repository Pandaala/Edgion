# Hostname 不匹配测试（负面测试）
# HTTPRoute hostname 不匹配 Listener hostname，应返回 404
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mismatch-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: hostname-test-gateway
      namespace: edgion-test
      sectionName: http-exact
  hostnames:
    - "other.example.com"  # 不匹配 listener hostname (api.example.com)
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
