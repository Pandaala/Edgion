#  4: sectionName + Hostname （）
# Route  secure listener，hostname 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: combined-section-hostname-match
  namespace: edgion-test
spec:
  parentRefs:
    - name: combined-test-gateway
      namespace: edgion-test
      sectionName: http-secure
  hostnames:
    - "secure.combined.example.com"  #  listener hostname
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
