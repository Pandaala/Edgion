# TCPRoute for the denied gateway (connections should be blocked at TCP level)
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: stream-plugins-tcp-denied
  namespace: edgion-test
spec:
  parentRefs:
    - name: stream-plugins-denied-gw
      namespace: edgion-test
      sectionName: tcp
  rules:
    - backendRefs:
        - name: test-tcp
          port: 30010
          weight: 100
