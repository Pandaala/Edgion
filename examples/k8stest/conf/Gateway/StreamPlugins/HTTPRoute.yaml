# HTTPRoute for the allowed (no-filter) gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stream-plugins-http
  namespace: edgion-test
spec:
  parentRefs:
    - name: stream-plugins-allowed-gw
      namespace: edgion-test
  hostnames:
    - "test.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: test-http
          port: 30001
