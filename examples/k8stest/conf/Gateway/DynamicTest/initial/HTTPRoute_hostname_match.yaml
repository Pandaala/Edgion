apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-hostname-match
  namespace: edgion-test
spec:
  parentRefs:
  - name: dynamic-test-gateway
    namespace: edgion-test
    sectionName: http-with-hostname
  hostnames:
  - "api.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /match
    backendRefs:
    - name: test-backend
      port: 8080
