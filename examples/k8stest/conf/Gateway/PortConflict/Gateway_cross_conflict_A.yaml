# Test: Cross-Gateway Port Conflict - Gateway A
# This Gateway's Listener conflicts with Gateway B on port 31261
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: port-conflict-cross-a
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
    # HTTP Listener on port 31261
    - name: http
      protocol: HTTP
      port: 31261
