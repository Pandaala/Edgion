# AllowedRoutes Selector Namespace test
# Gateway with allowedRoutes.namespaces.from: Selector
# In k8s integration mode, selector behavior is validated end-to-end:
# same-namespace route allowed, cross-namespace route denied.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: allowed-routes-selector-gateway
  namespace: edgion-test
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 31276
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              env: prod
