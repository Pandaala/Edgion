# Same namespace HTTPRoute for Selector test
# Same-namespace route should be accepted in this selector test setup.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: selector-same-ns-route
  namespace: edgion-test
spec:
  parentRefs:
    - name: allowed-routes-selector-gateway
      namespace: edgion-test
  hostnames:
    - "selector-same-ns.example.com"
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
