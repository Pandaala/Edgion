# 同 namespace 的 HTTPRoute（应允许）
# Route 和 Gateway 都在 edgion-test namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: all-same-ns-route
  namespace: edgion-test  # 与 Gateway 同 namespace
spec:
  parentRefs:
    - name: allowed-routes-all-gateway
      namespace: edgion-test
  hostnames:
    - "all-same-ns.example.com"
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001
