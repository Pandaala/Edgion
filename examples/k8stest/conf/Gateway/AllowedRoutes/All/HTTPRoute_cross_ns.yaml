# 跨 namespace 的 HTTPRoute（应允许）
# Route 在 edgion-default namespace，Gateway 在 edgion-test namespace
# 因为 Gateway 配置了 allowedRoutes.namespaces.from: All
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: all-cross-ns-route
  namespace: edgion-default  # 与 Gateway 不同 namespace
spec:
  parentRefs:
    - name: allowed-routes-all-gateway
      namespace: edgion-test
  hostnames:
    - "all-cross-ns.example.com"
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          namespace: edgion-test
          port: 30001
