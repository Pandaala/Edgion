apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-denied
  namespace: edgion-default
spec:
  parentRefs:
    - name: public-gateway
      namespace: edgion-test
  hostnames:
    - cross-ns-denied.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # This references a Service in edgion-system without a matching ReferenceGrant.
        - name: some-svc
          namespace: edgion-system
          port: 80
