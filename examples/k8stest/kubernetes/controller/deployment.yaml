# DEV ONLY — DO NOT USE IN PRODUCTION
# Uses IfNotPresent + shell restart loop for hot-reload during development.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgion-controller
  namespace: edgion-system
  labels:
    app: edgion-controller
    app.kubernetes.io/name: edgion-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edgion-controller
  template:
    metadata:
      labels:
        app: edgion-controller
        app.kubernetes.io/name: edgion-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: edgion-controller
      containers:
      - name: edgion-controller
        image: docker.io/pandaala/edgion-controller:dev
        imagePullPolicy: IfNotPresent
        command:
        - "/bin/sh"
        - "-c"
        - |
          while true; do
            if [ -f /usr/local/edgion/edgion-controller ]; then
              BINARY=/usr/local/edgion/edgion-controller
            else
              BINARY=/usr/local/bin/edgion-controller
            fi
            "$BINARY" --config-file /usr/local/edgion/config/edgion-controller.toml --test-mode || true
            echo "[restart] edgion-controller exited, restarting in 2s..."
            sleep 2
          done
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: http
          containerPort: 5800
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: KUBERNETES_SERVICE_HOST
          value: "kubernetes.default.svc"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /usr/local/edgion/config
          readOnly: true
        - name: logs
          mountPath: /usr/local/edgion/logs
      volumes:
      - name: config
        configMap:
          name: edgion-controller-config
      - name: logs
        emptyDir: {}
