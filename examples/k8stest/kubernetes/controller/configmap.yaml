apiVersion: v1
kind: ConfigMap
metadata:
  name: edgion-controller-config
  namespace: edgion-system
  labels:
    app: edgion-controller
    app.kubernetes.io/name: edgion-controller
    app.kubernetes.io/component: controller
data:
  edgion-controller.toml: |
    # Edgion Controller Configuration for Kubernetes Integration Testing
    work_dir = "/usr/local/edgion"

    [server]
    grpc_listen = "0.0.0.0:50051"
    admin_listen = "0.0.0.0:5800"

    [logging]
    log_dir = "logs"
    log_prefix = "edgion-controller"
    log_level = "info"
    json_format = true
    console = false
    buffer_size = 10000

    [conf_center]
    type = "kubernetes"
    gateway_class = "public-gateway"
    watch_namespaces = ["edgion-system", "edgion-default", "edgion-test", "edgion-backend"]
    endpoint_mode = "both"

    [conf_center.leader_election]
    lease_name = "edgion-controller-leader"
    lease_namespace = "edgion-system"
    lease_duration_secs = 15
    renew_period_secs = 10
    retry_period_secs = 2

    [debug]
    enabled = false

    [conf_center.metadata_filter]
    blocked_annotations = [
        "kubectl.kubernetes.io/last-applied-configuration",
        "meta.helm.sh/release-name",
        "meta.helm.sh/release-namespace",
    ]
    remove_managed_fields = true

    [conf_sync]
    no_sync_kinds = ["ReferenceGrant", "Secret"]
    gateway_classes_capacity = 50
    gateways_capacity = 200
    edgion_gateway_configs_capacity = 50
    routes_capacity = 200
    grpc_routes_capacity = 200
    tcp_routes_capacity = 200
    udp_routes_capacity = 200
    tls_routes_capacity = 200
    link_sys_capacity = 200
    services_capacity = 200
    endpoint_slices_capacity = 200
    edgion_tls_capacity = 200
    edgion_plugins_capacity = 200
    edgion_stream_plugins_capacity = 200
    reference_grants_capacity = 200
    backend_tls_policies_capacity = 200
    plugin_metadata_capacity = 200
    secrets_capacity = 200
    edgion_acme_capacity = 50
