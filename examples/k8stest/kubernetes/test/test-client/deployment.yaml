        port: 30005
      tcp:
        host: edgion-test-server.edgion-test.svc.cluster.local
        port: 30010
      udp:
        host: edgion-test-server.edgion-test.svc.cluster.local
        port: 30011
    
    # Gateway mode test endpoints
    gateway:
      http:
        host: edgion-gateway.edgion-system.svc.cluster.local
        port: 80
      https:
        host: edgion-gateway.edgion-system.svc.cluster.local
        port: 443
      grpc:
        host: edgion-gateway.edgion-system.svc.cluster.local
        port: 31050
  ports.json: |
    {
