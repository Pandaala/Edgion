apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- test-server/deployment.yaml
- test-server/service.yaml
- test-client/deployment.yaml

labels:
- includeSelectors: false
  includeTemplates: true
  pairs:
    app.kubernetes.io/part-of: edgion
    app.kubernetes.io/managed-by: kustomize

images:
- name: docker.io/pandaala/edgion-test-server
  newTag: "dev"
- name: docker.io/pandaala/edgion-test-client
  newTag: "dev"
