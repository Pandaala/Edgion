apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-http-basic
  namespace: edgion-test
spec:
  parentRefs:
    - name: gateway-80
      namespace: edgion-system
      sectionName: http

  hostnames:
    - "test.example.com"

  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: test-http
          port: 30001

    - matches:
        - path:
            type: PathPrefix
            value: /echo
      backendRefs:
        - name: test-http
          port: 30001

    - matches:
        - path:
            type: Exact
            value: /headers
      backendRefs:
        - name: test-http
          port: 30001

    - matches:
        - path:
            type: PathPrefix
            value: /status/
      backendRefs:
        - name: test-http
          port: 30001

    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: test-http
          port: 30001

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: test-http
          port: 30001
