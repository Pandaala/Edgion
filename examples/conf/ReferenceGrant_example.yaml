apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-default-to-test-secrets
  namespace: edgion-test
spec:
  # 允许 edgion-default namespace 中的 Gateway 引用 edgion-test 中的 Secret
  from:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: edgion-default
  to:
  - group: ""
    kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-default-to-test-services
  namespace: edgion-test
spec:
  # 允许 edgion-default namespace 中的 HTTPRoute/GRPCRoute 引用 edgion-test 中的 Service
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: edgion-default
  - group: gateway.networking.k8s.io
    kind: GRPCRoute
    namespace: edgion-default
  - group: gateway.networking.k8s.io
    kind: TCPRoute
    namespace: edgion-default
  - group: gateway.networking.k8s.io
    kind: UDPRoute
    namespace: edgion-default
  to:
  - group: ""
    kind: Service
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-test-to-default-services
  namespace: edgion-default
spec:
  # 允许 edgion-test namespace 中的 Route 引用 edgion-default 中的 Service
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: edgion-test
  - group: gateway.networking.k8s.io
    kind: GRPCRoute
    namespace: edgion-test
  to:
  - group: ""
    kind: Service
