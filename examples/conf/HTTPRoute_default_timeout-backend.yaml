apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: timeout-backend
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
      namespace: edge
  hostnames:
    - "timeout-backend.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: timeout-debug
      timeouts:
        backendRequest: "3s"    # 后端请求总超时
        perTryTimeout: "2s"     # 单次尝试超时
      backendRefs:
        - name: test-http
          namespace: edge
          port: 30001

