apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: test-udp
  namespace: edge
  labels:
    kubernetes.io/service-name: test-udp
addressType: IPv4
ports:
  - name: udp-30011
    port: 30011
    protocol: UDP
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true

