apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-test
  namespace: edgion-test
spec:
  parentRefs:
    - name: example-gateway
      namespace: edgion-test

  hostnames:
    - "*.wildcard.example.com"
  
  rules:
    # Wildcard hostname test endpoint
    - matches:
        - path:
            type: Exact
            value: /wildcard-test
      backendRefs:
        - name: test-http
          port: 30001

    # Health check for wildcard
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: test-http
          port: 30001

