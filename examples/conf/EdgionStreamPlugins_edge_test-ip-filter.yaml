apiVersion: edgion.io/v1
kind: EdgionStreamPlugins
metadata:
  name: test-ip-filter
  namespace: edge
spec:
  plugins:
    # IP restriction for stream connections - allows localhost for testing
    - enable: true
      type: ipRestriction
      config:
        # IP source: remoteAddr (direct connection)
        ipSource: remoteAddr
        # Allow list: local addresses for testing
        allow:
          - "127.0.0.0/8"    # IPv4 localhost
          - "::1/128"         # IPv6 localhost
        # Deny list: empty for testing
        deny: []
        # Default action when no rules match: deny
        defaultAction: deny
        # Custom message for denied connections
        message: "Access denied by stream plugin - IP not in allowlist"
        # Status code (not used for stream, kept for compatibility)
        status: 403

