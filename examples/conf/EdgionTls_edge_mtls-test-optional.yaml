apiVersion: edgion.io/v1
kind: EdgionTls
metadata:
  name: mtls-test-optional
  namespace: edge
spec:
  parentRefs:
    - name: mtls-test-gateway
      namespace: edge
  hosts:
    - mtls-optional.example.com
  secretRef:
    name: mtls-server
    namespace: edge
  clientAuth:
    mode: OptionalMutual
    caSecretRef:
      name: client-ca
      namespace: edge
    verifyDepth: 1

