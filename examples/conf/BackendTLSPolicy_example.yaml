---
# Example 1: Basic BackendTLSPolicy with CA certificate from Secret
# Note: targetRefs and caCertificateRefs can only reference resources in the SAME namespace
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: backend-tls-example
  namespace: edgion-default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: backend-service
  validation:
    hostname: backend.example.com
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: backend-ca-cert

---
# Example 2: BackendTLSPolicy using system CA certificates
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: backend-tls-system-ca
  namespace: edgion-default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: secure-backend
  validation:
    hostname: secure.backend.local
    wellKnownCACertificates: System

---
# Example 3: BackendTLSPolicy for multiple backends in edgion-test namespace
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: multi-backend-tls
  namespace: edgion-test
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: backend-1
    - group: ""
      kind: Service
      name: backend-2
  validation:
    hostname: "test.internal"
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: ca-bundle
