---
# Example 1: Basic BackendTLSPolicy with CA certificate from Secret
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: backend-tls-example
  namespace: default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: backend-service
      namespace: default
  validation:
    hostname: backend.example.com
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: backend-ca-cert
        namespace: default

---
# Example 2: BackendTLSPolicy using system CA certificates
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: backend-tls-system-ca
  namespace: default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: secure-backend
  validation:
    hostname: secure.backend.local
    wellKnownCACertificates: System

---
# Example 3: BackendTLSPolicy for multiple backends
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: multi-backend-tls
  namespace: production
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: backend-1
      namespace: production
    - group: ""
      kind: Service
      name: backend-2
      namespace: production
  validation:
    hostname: "*.production.internal"
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: ca-bundle
        namespace: production

