apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weighted-backend
  namespace: edgion-default
spec:
  parentRefs:
    - name: example-gateway
      namespace: edgion-test
  hostnames:
    - "weighted-backend.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: edgion.io
            kind: EdgionPlugins
            name: timeout-debug  # 复用现有的debug插件
      backendRefs:
        - name: backend-a
          namespace: edgion-test
          port: 30001
          weight: 50    # 50%
        - name: backend-b
          namespace: edgion-test
          port: 30001
          weight: 30    # 30%
        - name: backend-c
          namespace: edgion-test
          port: 30001
          weight: 20    # 20%

