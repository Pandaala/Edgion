apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: section-test-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
      namespace: edge
      sectionName: http  # 只绑定到 HTTP listener
  hostnames:
    - "section-test.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: test-http
          namespace: edge
          port: 30001

