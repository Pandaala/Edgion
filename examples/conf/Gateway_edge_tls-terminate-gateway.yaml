apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tls-terminate-gateway
  namespace: edgion-test
  annotations:
    # Custom annotation: indicates this TLS listener needs to terminate to TCP backend
    edgion.io/backend-protocol: tcp
spec:
  gatewayClassName: public-gateway
  listeners:
    - name: tls-terminate-tcp
      protocol: TLS
      port: 19001
      tls:
        mode: Terminate
        certificateRefs:
          - name: edge-tls

