apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-ewma-route
  namespace: edgion-default
spec:
  parentRefs:
    - name: example-gateway
      namespace: edgion-default
      sectionName: http
  hostnames:
    - "ewma.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: example-service
          port: 8080
          # EWMA load balancing policy - selects backend with lowest response time
          filters:
            - type: ExtensionRef
              extensionRef:
                group: edgion.io
                kind: LBPolicyEwma
                name: default

