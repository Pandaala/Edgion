apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-route4
  namespace: test4
spec:
  parentRefs:
    - name: gateway1
      namespace: default
      sectionName: https18443

  hostnames:
    - "ccc4.example.com"
    - "ddd4.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /aaa/doc/
        - path:
            type: PathPrefix
            value: /aaa/exact
      backendRefs:
        - name: aaa-service
          port: 30001
          weight: 0
        - name: aaa-service
          port: 30002
          kind: Service
          weight: 1
        - name: bbb-service
          port: 30003
          weight: 0
          kind: Service
