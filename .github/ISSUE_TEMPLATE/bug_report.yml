name: Bug Report
description: Report a bug to help us improve Edgion
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Send request to '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration files (Gateway, HTTPRoute, etc.)
      render: yaml
      placeholder: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        ...

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (controller/gateway logs)
      render: shell
      placeholder: Paste logs here...

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - edgion-gateway
        - edgion-controller
        - edgion-ctl
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Edgion Version
      description: Output of `edgion-gateway --version` or `edgion-controller --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Kubernetes
        - Other
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "rustc 1.82.0"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.

