name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.92"
          install-deps: "true"
          cache-enabled: "true"
          cache-key-prefix: "cargo-check"

      - name: Run cargo check
        run: cargo check --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.92"
          components: rustfmt
          install-deps: "false"
          cache-enabled: "false"
          cache-key-prefix: "cargo-fmt"

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  agent-docs:
    name: Agent Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate agent docs
        run: make check-agent-docs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.92"
          components: clippy
          install-deps: "true"
          cache-enabled: "true"
          cache-key-prefix: "cargo-clippy"

      - name: Run clippy
        run: cargo clippy --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.92"
          install-deps: "true"
          cache-enabled: "true"
          cache-key-prefix: "cargo-test"

      - name: Run tests
        run: cargo test --all

  # Summary job for branch protection
  ci-success:
    name: CI Success
    needs: [check, fmt, agent-docs, clippy, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]] || \
             [[ "${{ needs.fmt.result }}" != "success" ]] || \
             [[ "${{ needs.agent-docs.result }}" != "success" ]] || \
             [[ "${{ needs.clippy.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
