name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*" # matches v1.0.0, v0.1.0-beta, etc.

env:
  IMAGE_REGISTRY: docker.io
  IMAGE_NAMESPACE: pandaala
  RUST_VERSION: "1.92"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [gateway, controller]
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu

    name: Build ${{ matrix.binary }} (${{ matrix.arch }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update stable
          rustup target add ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake libclang-dev

      - name: Install AArch64 cross compiler
        if: matrix.arch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "build-${{ matrix.binary }}-${{ matrix.target }}"
          prefix-key: v1

      - name: Build binary
        run: cargo build --release --bin edgion-${{ matrix.binary }} --bin edgion-ctl --target ${{ matrix.target }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgion-${{ matrix.binary }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/edgion-${{ matrix.binary }}
            target/${{ matrix.target }}/release/edgion-ctl

  build-and-push-images:
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [gateway, controller]
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu

    name: Build image for ${{ matrix.binary }} (${{ matrix.arch }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: edgion-${{ matrix.binary }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release

      - name: Prepare binaries
        run: |
          chmod +x target/${{ matrix.target }}/release/edgion-${{ matrix.binary }}
          chmod +x target/${{ matrix.target }}/release/edgion-ctl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}
          tags: |
            type=raw,value=${{ github.ref_name }}_${{ matrix.arch }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.runtime
          build-args: |
            BINARY=${{ matrix.binary }}
            BINARY_PATH=target/${{ matrix.target }}/release
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [gateway, controller]

    name: Merge manifests for ${{ matrix.binary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Extract semver components
          VERSION_NO_V=${VERSION#v}
          echo "version_no_v=$VERSION_NO_V" >> $GITHUB_OUTPUT
          MAJOR=$(echo $VERSION_NO_V | cut -d. -f1)
          MINOR=$(echo $VERSION_NO_V | cut -d. -f1-2)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}:${{ steps.version.outputs.version_no_v }} \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}:${{ steps.version.outputs.minor }} \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}:${{ steps.version.outputs.major }} \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}:latest \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}:${{ steps.version.outputs.version }}_amd64 \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/edgion-${{ matrix.binary }}:${{ steps.version.outputs.version }}_arm64
